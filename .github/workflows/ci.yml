name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No unit tests yet — this verifies the package resolves and lints across the
# whole supported matrix (dependency-compatibility check).
jobs:
  compat:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['11', '12', '13']
        exclude:
          - php: '8.2'
            laravel: '13'
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Pin Laravel version
        run: composer require "laravel/framework:^${{ matrix.laravel }}.0" --no-update --no-interaction
      - name: Allow EOL framework resolution (Laravel 11 only)
        if: matrix.laravel == '11'
        run: composer config policy.advisories.block false
      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress
      - name: Lint
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
